name: build-test-pack-publish

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  build_test_pack:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: NBGV
        id: nbgv
        uses: dotnet/nbgv@master
        with:
          setAllVars: true

      - run: echo 'SemVer2=${{ steps.nbgv.outputs.SemVer2 }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ReactiveAgenticLoopEngineer.slnx

      - name: Build
        run: dotnet build ReactiveAgenticLoopEngineer.slnx -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test --project tests/RALE.Tests/RALE.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/RALE.Server/RALE.Server.csproj -c Release -o artifacts /p:ContinuousIntegrationBuild=true

      - name: Verify package contents
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/*.nupkg | Select-Object -First 1
          if (-not $package) {
            throw "No NuGet package was created."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)
          try {
            $entries = $archive.Entries.FullName
            $requiredEntries = @(
              "README.md",
              ".mcp/server.json",
              "images/rale-image.ico",
              "images/rale-image.png",
              "images/rale-package-icon.png",
              "skills/RALE/SKILL.md"
            )

            $missingEntries = $requiredEntries | Where-Object { $entries -notcontains $_ }
            if ($missingEntries) {
              throw "Package $($package.Name) is missing required entries: $($missingEntries -join ', ')"
            }
          }
          finally {
            $archive.Dispose()
          }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish_nuget:
    needs: build_test_pack
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest

    environment:
      name: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: artifacts

      - name: NBGV
        id: nbgv
        uses: dotnet/nbgv@master
        with:
          setAllVars: true

      - run: echo 'SemVer2=${{ steps.nbgv.outputs.SemVer2 }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install GitReleaseNoteGenerator
        run: dotnet tool install -g GitReleaseNoteGenerator

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-release-notes --release-version "${{ steps.nbgv.outputs.SemVer2 }}" --output-file release-notes.md

      - name: Publish to NuGet
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
          SOURCE_URL: https://api.nuget.org/v3/index.json
        run: dotnet nuget push artifacts/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.nbgv.outputs.SemVer2 }}" --repo "${{ github.repository }}" --title "${{ steps.nbgv.outputs.SemVer2 }}" --notes-file release-notes.md
